<!DOCTYPE html>
<html>
<head>
    <title>PixelTruth Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-page">

    <div class="login-card">

        <h1>PIXEL<span>TRUTH</span></h1>

        <p>
            Authentic vs Manipulated Image Detection
        </p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit" class="login-btn">
                LOGIN →
            </button>

        </form>

        <button class="gmail-btn">
            Continue with Gmail
        </button>

        <div class="bottom-link">
            Don't have an account?
            <a href="{{ url_for('signup') }}">
                Create Account
            </a>
        </div>

    </div>

</div>

</body>
</html>
